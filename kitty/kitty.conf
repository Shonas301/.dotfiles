# kitty config — only customizations; defaults come from upstream
# reference: https://sw.kovidgoyal.net/kitty/conf/
# macos-oriented bindings (cmd+*); on linux these map to nothing — harmless

# splits + stack so cmd+d/cmd+shift+d can make panes
enabled_layouts splits,stack

# splits (vsplit = vertical divider, hsplit = horizontal)
map cmd+d        launch --location=vsplit --cwd=current
map cmd+shift+d  launch --location=hsplit --cwd=current

# vim-style pane navigation
map cmd+h  neighboring_window left
map cmd+j  neighboring_window down
map cmd+k  neighboring_window up
map cmd+l  neighboring_window right

# move pane in direction
map cmd+shift+h  move_window left
map cmd+shift+j  move_window down
map cmd+shift+k  move_window up
map cmd+shift+l  move_window right

# pane ops
map cmd+r  start_resizing_window
map cmd+w  close_window

# tabs
map cmd+t        new_tab_with_cwd
map cmd+shift+]  next_tab
map cmd+shift+[  previous_tab
map cmd+1        goto_tab 1
map cmd+2        goto_tab 2
map cmd+3        goto_tab 3
map cmd+4        goto_tab 4
map cmd+5        goto_tab 5
map cmd+6        goto_tab 6
map cmd+7        goto_tab 7
map cmd+8        goto_tab 8
map cmd+9        goto_tab 9

# reload without restarting
map cmd+shift+r  load_config_file
